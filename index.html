<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday PRITHILA 🎀</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:'Segoe UI',sans-serif;
  background:radial-gradient(circle,#1a001a,#000);
  color:#fff;
  overflow-x:hidden;
}

/* Banner */
.banner{
  text-align:center;
  font-size:38px;
  padding:30px 10px;
  font-weight:800;
  text-shadow:0 0 25px #ff4da6;
}

/* Clock */
#clock{
  text-align:center;
  font-size:18px;
  color:#ffd6eb;
}

/* Countdown */
#countdown{
  margin:20px;
  padding:15px;
  border-radius:20px;
  text-align:center;
  font-size:20px;
  background:rgba(255,255,255,0.1);
  box-shadow:0 0 15px #ff4da6;
}

/* Card */
.card{
  margin:20px;
  padding:25px;
  background:rgba(255,255,255,0.08);
  border-radius:25px;
  line-height:1.8;
  text-align:center;
}

/* Gallery */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
}
.gallery img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:20px;
  animation:zoom 6s infinite alternate;
}
@keyframes zoom{
  from{transform:scale(1)}
  to{transform:scale(1.1)}
}

/* Floating hearts */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:18px;
  animation:float 6s linear infinite;
}
@keyframes float{
  to{transform:translateY(-110vh);opacity:0}
}

/* Popup */
#popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

#popup .box{
  padding:30px;
  background:#1a001a;
  border-radius:25px;
  text-align:center;
  box-shadow:0 0 40px #ff4da6;
}

/* Fireworks */
#fireworks{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:998;
}

/* Mobile */
@media(max-width:600px){
  .banner{font-size:28px}
  .gallery img{height:130px}
}
</style>
</head>

<body>

<div class="banner">🎉 Happy Birthday PRITHILA 🎀</div>
<div id="clock"></div>
<div id="countdown"></div>

<div class="card">
<p>
Happy Birthday <b>PRITHILA &lt;3</b> my LOVE ❤️<br><br>
I LOVE YOU so much Jaanpakhiii ❤️❤️❤️
</p>
</div>

<div class="card">
<div class="gallery">
  <img src="img1.jpeg">
  <img src="img2.jpeg">
  <img src="img3.jpeg">
  <img src="img4.jpeg">
  <img src="img5.jpeg">
  <img src="img6.jpeg">
</div>
</div>

<!-- Popup -->
<div id="popup">
  <div class="box">
    <h2>🎂 Happy Birthday 🎂</h2>
    <p>
      Happy Birthday Moynapakhiiiii &lt;3<br>
      I love you FOREVER my PRETTIEST WIFEY 💋
    </p>
  </div>
</div>

<canvas id="fireworks"></canvas>

<script>
const popup=document.getElementById("popup");

/* SHOW POPUP ON PAGE LOAD (4 sec) */
window.onload = () => {
  popup.style.display="flex";
  setTimeout(()=>{
    popup.style.display="none";
  },4000);
};

/* Floating hearts */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.style.left=Math.random()*100+"vw";
  h.innerHTML="💖";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);

/* Clock */
function clock(){
  const d=new Date();
  document.getElementById("clock").innerHTML=
    `🕒 ${d.toLocaleTimeString()}<br>📅 ${d.toDateString()}`;
}
setInterval(clock,1000); clock();

/* Fireworks */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
let parts=[];

function heartFirework(){
  for(let i=0;i<180;i++){
    const t=Math.random()*Math.PI*2;
    const r=16*(1-Math.sin(t));
    parts.push({
      x:canvas.width/2,
      y:canvas.height/2,
      vx:r*Math.cos(t),
      vy:-r*Math.sin(t),
      a:1
    });
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  parts.forEach((p,i)=>{
    p.x+=p.vx*.05;
    p.y+=p.vy*.05;
    p.a-=.01;
    ctx.fillStyle=`rgba(255,80,150,${p.a})`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fill();
    if(p.a<=0)parts.splice(i,1);
  });
  requestAnimationFrame(animate);
}
animate();

/* Countdown */
const birthday = new Date("2025-05-25T00:00:00").getTime();
const countdown=document.getElementById("countdown");
let done=false;

const timer=setInterval(()=>{
  const now=Date.now();
  const diff=birthday-now;

  if(diff<=0){
    countdown.innerHTML=
      "🎉 Happy Birthday Moynapakhiiiii &lt;3<br>I love you FOREVER my PRETTIEST WIFEY 💋";

    if(!done){
      done=true;
      popup.style.display="flex";
      heartFirework();

      /* POPUP 4 SECONDS */
      setTimeout(()=>{
        popup.style.display="none";
      },4000);

      clearInterval(timer);
    }
    return;
  }

  const d=Math.floor(diff/86400000);
  const h=Math.floor(diff%86400000/3600000);
  const m=Math.floor(diff%3600000/60000);
  const s=Math.floor(diff%60000/1000);

  countdown.innerHTML=
    `⏳ ${d}d ${h}h ${m}m ${s}s until your birthday 🎂`;
},1000);
</script>

</body>
</html>
