<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday PRITHILA 🎀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  background:radial-gradient(circle,#1a001a,#000);
  color:#fff;
  font-family:'Playfair Display',serif;
  overflow-x:hidden;
}

/* 🌈 Animated Banner */
.banner{
  text-align:center;
  font-family:'Pacifico',cursive;
  font-size:42px;
  padding:30px;
  animation:glow 3s infinite alternate, wave 6s infinite;
}
@keyframes glow{
  from{text-shadow:0 0 10px #ff4da6}
  to{text-shadow:0 0 35px #ff99cc}
}
@keyframes wave{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
}

/* Clock */
#clock{text-align:center;color:#ffd6eb}

/* ❤️ Heartbeat Countdown */
#countdown{
  margin:20px;
  padding:15px;
  border-radius:20px;
  text-align:center;
  font-size:22px;
  background:rgba(255,255,255,.1);
  animation:heartbeat 1.5s infinite;
}
@keyframes heartbeat{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.05)}
}

/* Fade in sections */
.card{
  margin:20px;
  padding:25px;
  background:rgba(255,255,255,.08);
  border-radius:25px;
  line-height:1.9;
  text-align:center;
  animation:fadeIn 2s ease;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ✍ Typing text */
.typing{
  overflow:hidden;
  white-space:nowrap;
  border-right:2px solid pink;
  animation:typing 6s steps(60,end), blink .8s infinite;
}
@keyframes typing{from{width:0}to{width:100%}}
@keyframes blink{50%{border-color:transparent}}

/* 🌸 Flower falling */
.flower{
  position:fixed;
  top:-10px;
  font-size:18px;
  animation:fall 8s linear infinite;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);opacity:0}
}

/* 🖼️ Gallery animations */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
}
.gallery img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:20px;
  transition:.6s;
}
.gallery img:hover{
  transform:scale(1.1) rotate(2deg);
  box-shadow:0 0 25px pink;
}

/* Popup */
#popup{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,.9);
  align-items:center;
  justify-content:center;
  z-index:999;
}
#popup .box{
  padding:30px;
  background:#1a001a;
  border-radius:25px;
  text-align:center;
  font-family:'Pacifico',cursive;
  animation:pop 1s ease;
}
@keyframes pop{
  from{transform:scale(.3);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* Fireworks */
#fireworks{position:fixed;inset:0;pointer-events:none;z-index:998}

/* Mobile */
@media(max-width:600px){
  .banner{font-size:28px}
  .gallery img{height:130px}
}
</style>
</head>

<body>

<div class="banner">🎉 Happy Birthday PRITHILA 🎀</div>
<div id="clock"></div>
<div id="countdown"></div>

<div class="card">
<div class="typing">
Happy Birthday PRITHILA ❤️ My CUTIE, SWEETHEART, DARLING & PRETTIEST WIFEY 🎀
</div>
<p>
You are my happiness, my peace, my forever 💖  
I love you more every single day 😭❤️
</p>
</div>

<div class="card">
<div class="gallery">
  <img src="img1.jpeg">
  <img src="img2.jpeg">
  <img src="img3.jpeg">
  <img src="img4.jpeg">
  <img src="img5.jpeg">
  <img src="img6.jpeg">
</div>
</div>

<div id="popup">
  <div class="box">
    🎂 Happy Birthday Moynapakhiiiii &lt;3<br>
    I love you FOREVER 💋
  </div>
</div>

<canvas id="fireworks"></canvas>

<script>
/* Clock */
setInterval(()=>{
  const d=new Date();
  clock.innerHTML=`🕒 ${d.toLocaleTimeString()}<br>📅 ${d.toDateString()}`
},1000);

/* Floating flowers */
setInterval(()=>{
  const f=document.createElement("div");
  f.className="flower";
  f.style.left=Math.random()*100+"vw";
  f.innerHTML=["🌸","🌺","💮"][Math.floor(Math.random()*3)];
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),8000);
},600);

/* Countdown */
const birthday=new Date("2025-05-25T00:00:00").getTime();
const popup=document.getElementById("popup");
let done=false;

setInterval(()=>{
  const diff=birthday-Date.now();
  if(diff<=0 && !done){
    done=true;
    countdown.innerHTML="🎉 HAPPY BIRTHDAY MY LOVE ❤️";
    popup.style.display="flex";
  }else if(!done){
    const d=Math.floor(diff/86400000),
    h=Math.floor(diff%86400000/3600000),
    m=Math.floor(diff%3600000/60000),
    s=Math.floor(diff%60000/1000);
    countdown.innerHTML=`⏳ ${d}d ${h}h ${m}m ${s}s`
  }
},1000);
</script>

</body>
</html>
