<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday PRITHILA 🎀</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:radial-gradient(circle,#1a001a,#000);
  color:#fff;
  overflow-x:hidden;
}

.main-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#top-countdown {
  position: sticky;
  top: 0;
  width: 100%;
  z-index: 1000;
  text-align: center;
  background: rgba(255, 77, 166, 0.25);
  backdrop-filter: blur(15px);
  padding: 15px;
  font-weight: bold;
  font-size: 1.1rem;
  border-bottom: 2px solid #ff4da6;
  color: #ffd6eb;
  text-shadow: 0 0 10px #ff4da6;
}

.banner{
  text-align:center;
  font-size:38px;
  padding:40px 10px 10px 10px;
  font-weight:800;
  text-shadow:0 0 25px #ff4da6;
}

#main-countdown-container {
  text-align:center;
  margin-bottom: 30px;
}
#main-countdown {
  font-size:32px;
  font-weight: bold;
  color:#ff4da6;
  text-shadow: 0 0 15px rgba(255, 77, 166, 0.8);
}

.countdown-label {
  font-size: 18px;
  font-weight: 800;
  color: #ff4da6;
  display: block;
  margin-top: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.card{
  width: 90%;
  margin: 20px auto;
  padding: 30px;
  background:rgba(255,255,255,0.08);
  border-radius:30px;
  line-height:1.8;
  text-align:center;
  border: 1px solid rgba(255, 77, 166, 0.2);
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 25px;
  padding: 15px;
  width: 100%;
  justify-items: center;
}

.photo-frame {
  position: relative;
  width: 100%;
  max-width: 450px;
  height: 550px;
  background: rgba(255, 255, 255, 0.03); 
  border-radius: 25px;
  overflow: hidden;
  border: 1px solid rgba(255, 77, 166, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

.gallery img {
  max-width: 95%;
  max-height: 95%;
  object-fit: contain; 
}

.heart{
  position:fixed;
  bottom:-20px;
  font-size:22px;
  animation:float 6s linear infinite;
  z-index: 997;
}
@keyframes float{
  to{transform:translateY(-110vh);opacity:0}
}

/* Surprising Overlay */
#birthday-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none; 
  flex-direction: column;
  align-items:center;
  justify-content:center;
  z-index:10000;
  text-align: center;
  animation: fadeIn 1.5s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

#birthday-overlay h1 {
  font-size: 4rem;
  color: #ff4da6;
  text-shadow: 0 0 20px #ff4da6, 0 0 40px #ff0080;
  margin-bottom: 20px;
}

#fireworks{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index: 999;
}

@media(max-width:800px){
  .banner{font-size:28px}
  .photo-frame{height: 450px;}
  #birthday-overlay h1 { font-size: 2.5rem; }
}
</style>
</head>

<body>

<div id="top-countdown">Calculating...</div>

<div class="main-wrapper">
  <div class="banner">🎉 Happy Birthday PRITHILA 🎀</div>

  <div id="main-countdown-container">
    <div id="main-countdown">00d 00h 00m 00s</div>
    <span class="countdown-label" id="timer-tag">until your birthday 25 May 🎂</span>
  </div>

  <div class="card">
    <p>Happy Birthday <b>PRITHILA &lt;3</b> my LOVE ❤️<br>
    I LOVE YOU so much Jaanpakhiii ❤️❤️❤️</p>
  </div>

  <div class="card" style="background: transparent; border: none;">
    <div class="gallery">
      <div class="photo-frame"><img src="img1.jpeg"></div>
      <div class="photo-frame"><img src="img2.jpeg"></div>
      <div class="photo-frame"><img src="img3.jpeg"></div>
      <div class="photo-frame"><img src="img4.jpeg"></div>
      <div class="photo-frame"><img src="img5.jpeg"></div>
      <div class="photo-frame"><img src="img6.jpeg"></div>
    </div>
  </div>
</div>

<!-- SURPRISE OVERLAY -->
<div id="birthday-overlay">
  <h1>IT'S 25 MAY!<br>HAPPY BIRTHDAY<br>PRITHILA 🎀</h1>
  <p style="font-size: 1.5rem;">The world got brighter the day you were born! 🎂</p>
  <button onclick="document.getElementById('birthday-overlay').style.display='none'" 
    style="margin-top: 30px; padding: 10px 25px; border-radius: 20px; border: none; background: #ff4da6; color: white; font-weight: bold; cursor: pointer;">
    Close Surprise
  </button>
</div>

<canvas id="fireworks"></canvas>

<script>
const topBar = document.getElementById("top-countdown");
const mainDisplay = document.getElementById("main-countdown");
const timerTag = document.getElementById("timer-tag");
const overlay = document.getElementById("birthday-overlay");
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;
let parts = [];
let isBirthday = false;

// Target: 25th May 12:00 AM
const targetDate = new Date("May 25, 2026 00:00:00").getTime();

function heartFirework(customX, customY){
  for(let i=0; i<150; i++){
    const t = Math.random() * Math.PI * 2;
    const r = 16 * (1 - Math.sin(t));
    parts.push({
      x: customX || canvas.width/2,
      y: customY || canvas.height/2,
      vx: r * Math.cos(t),
      vy: -r * Math.sin(t),
      a: 1
    });
  }
}

const timer = setInterval(() => {
  const now = new Date().getTime();
  const diff = targetDate - now;

  if (diff <= 0) {
    if(!isBirthday) {
      isBirthday = true;
      triggerSurprise();
    }
    topBar.innerHTML = "🎉 HAPPY BIRTHDAY PRITHILA! ❤️";
    mainDisplay.innerHTML = "🎉 MAY 25: YOUR DAY! 🎂";
    timerTag.style.display = 'none';
    return;
  }

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const s = Math.floor((diff % (1000 * 60)) / 1000);

  const timeString = `${d}d ${h}h ${m}m ${s}s`;
  topBar.innerHTML = `⏳ ${timeString} until 25 May 🎂`;
  mainDisplay.innerHTML = timeString;
}, 1000);

function triggerSurprise() {
  overlay.style.display = "flex";
  // Launch multiple fireworks
  setInterval(() => {
    heartFirework(Math.random()*canvas.width, Math.random()*canvas.height);
  }, 2000);
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  parts.forEach((p,i)=>{
    p.x += p.vx * 0.05;
    p.y += p.vy * 0.05;
    p.a -= 0.008;
    ctx.fillStyle = `rgba(255,80,150,${p.a})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
    if(p.a <= 0) parts.splice(i,1);
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  canvas.width = innerWidth; canvas.height = innerHeight;
});

// Floating hearts logic
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.style.left=Math.random()*100+"vw";
  h.innerHTML="💖";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);
</script>

</body>
</html>
